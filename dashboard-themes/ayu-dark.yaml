name: ayu-dark
label: Ayu Dark
description: Dark · near-black background with gold + azure accents — ayu-colors dark variant

# Palette references mirror the CLI skin (skins/ayu-dark.yaml) so the
# terminal and web dashboard look like the same theme. See docs/PALETTE.md.

palette:
  # Canonical ayu dark background.
  background:
    hex: "#0B0E14"
    alpha: 1
  # Primary text/foreground accent.
  midground:
    hex: "#BFBDB6"
    alpha: 1
  # Top highlight kept at alpha 0 to mirror builtin behaviour.
  foreground:
    hex: "#ffffff"
    alpha: 0
  # Sunrise warm vignette — pulls the canvas toward dawn light.
  warmGlow: "rgba(255, 180, 84, 0.22)"
  # Subdued noise.
  noiseOpacity: 0.7

typography:
  fontSans: '"Geist", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif'
  fontMono: '"Geist Mono", "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace'
  fontDisplay: '"Geist", system-ui, sans-serif'
  fontUrl: "https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;700&display=swap"
  baseSize: "15px"
  lineHeight: "1.6"
  letterSpacing: "-0.005em"

layout:
  radius: "0.5rem"
  density: "comfortable"

# Override the Nous DS font CSS variables — without these, the dashboard chrome
# (nav, headings, branding) renders in Mondwest / Rules Expanded display fonts
# regardless of `typography.fontSans`. Routing those vars through Geist makes
# the whole UI visually consistent.
customCSS: |
  :root {
    --font-sans: "Geist", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --font-mono: "Geist Mono", "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --font-mondwest: "Geist", system-ui, sans-serif;
    --font-rules-expanded: "Geist", system-ui, sans-serif;
    --font-rules-compressed: "Geist", system-ui, sans-serif;
  }
  :where([style*="Collapse"], [class*="collapse"]) {
    font-family: "Geist", system-ui, sans-serif;
  }

# Pin shadcn tokens to ayu palette so accents read as ayu rather than DS-derived greys.
colorOverrides:
  primary: "#59C2FF"
  primaryForeground: "#0B0E14"
  accent: "#FFB454"
  accentForeground: "#0B0E14"
  ring: "#59C2FF"
  destructive: "#F26D78"
  destructiveForeground: "#0B0E14"
  success: "#AAD94C"
  warning: "#E6B450"
  border: "#1F2430"
  input: "#11151C"
  muted: "#11151C"
  mutedForeground: "#565B66"
